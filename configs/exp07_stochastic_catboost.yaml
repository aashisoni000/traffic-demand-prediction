project_name: traffic_demand_prediction
seed: 42
log_level: INFO
features:
  enabled:
    - lag1_demand
    - rolling_mean_3

catboost:
  iterations: 1400
  learning_rate: 0.025
  depth: 8
  l2_leaf_reg: 6
  bootstrap_type: Bayesian
  bagging_temperature: 1
  random_strength: 1
  od_wait: 120

paths:
  artifacts_dir: artifacts/experiments/stochastic_catboost
  oof_dir: oof/experiments/stochastic_catboost
  reports_dir: reports/experiments/stochastic_catboost
  logs_dir: artifacts/logs/experiments/stochastic_catboost
  submission_dir: submissions/experiments/stochastic_catboost